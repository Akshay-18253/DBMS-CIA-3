<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GG Report — End Toxicity. Protect the Game.</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-red: #ff2255;
      --neon-blue: #00cfff;
      --neon-yellow: #ffe600;
      --bg-dark: #040810;
      --bg-card: #080f1a;
      --bg-card2: #0a1525;
      --border: #0f2a40;
      --border-glow: #00cfff44;
      --text-main: #cce8ff;
      --text-dim: #4a7a9b;
      --text-muted: #2a4a6b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { cursor: none; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 9000; pointer-events: none; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px); }
    #cursor { position: fixed; top: 0; left: 0; z-index: 99999; pointer-events: none; mix-blend-mode: screen; }
    #cursor-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green); position: absolute; transform: translate(-50%, -50%); transition: transform 0.05s; }
    #cursor-ring { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); position: absolute; transform: translate(-50%, -50%); transition: all 0.12s ease; }
    #cursor-crosshair { width: 60px; height: 60px; position: absolute; transform: translate(-50%, -50%); }
    #cursor-crosshair::before, #cursor-crosshair::after { content: ''; position: absolute; background: var(--neon-red); opacity: 0.5; }
    #cursor-crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
    #cursor-crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }
    .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,207,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,207,255,0.04) 1px, transparent 1px); background-size: 50px 50px; animation: gridPulse 8s ease-in-out infinite; }
    @keyframes gridPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; background: rgba(4,8,16,0.92); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .nav-logo { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); letter-spacing: 2px; }
    .nav-logo span { color: var(--neon-red); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 2px; color: var(--text-dim); text-decoration: none; text-transform: uppercase; transition: all 0.2s; position: relative; cursor: none; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); transition: width 0.3s; }
    .nav-links a:hover { color: var(--neon-blue); }
    .nav-links a:hover::after { width: 100%; }
    .nav-btn { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px 22px; background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 12px rgba(0,255,136,0.25), inset 0 0 12px rgba(0,255,136,0.06); transition: all 0.2s; cursor: none; }
    .nav-btn:hover { background: rgba(0,255,136,0.12); box-shadow: 0 0 24px rgba(0,255,136,0.5), inset 0 0 24px rgba(0,255,136,0.1); }
    section { position: relative; z-index: 1; }
    #hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 40px 80px; overflow: hidden; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--neon-yellow); letter-spacing: 3px; text-transform: uppercase; border: 1px solid rgba(255,230,0,0.3); padding: 6px 16px; margin-bottom: 32px; animation: badgeBlink 2s ease-in-out infinite; }
    .hero-badge::before { content: '⚠'; font-size: 14px; }

    .hero-title .line2 { display: block; color: var(--neon-green); text-shadow: 0 0 40px var(--neon-green), 0 0 80px var(--neon-green); animation: titleGlow 3s ease-in-out infinite; }

    .hero-sub { font-size: clamp(16px, 2.5vw, 22px); font-weight: 300; color: var(--text-dim); max-width: 640px; line-height: 1.7; margin: 20px auto 48px; letter-spacing: 0.5px; }
    .hero-sub strong { color: var(--neon-blue); font-weight: 700; }
    .hero-btns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

    .btn-secondary { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 16px 40px; background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0,207,255,0.2), inset 0 0 20px rgba(0,207,255,0.05); transition: all 0.2s; cursor: none; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
    .btn-secondary:hover { background: rgba(0,207,255,0.1); box-shadow: 0 0 40px rgba(0,207,255,0.4), inset 0 0 20px rgba(0,207,255,0.1); }

    .stat-item { text-align: center; }

    .stat-label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

    #problem { padding: 100px 40px; background: linear-gradient(180deg, transparent 0%, rgba(255,34,85,0.04) 50%, transparent 100%); }
    .section-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--neon-red); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .section-label::before { content: '//'; opacity: 0.5; }

    .problem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2px; max-width: 1200px; margin: 0 auto; }
    .problem-card { background: var(--bg-card); border: 1px solid var(--border); padding: 36px 32px; position: relative; overflow: hidden; transition: all 0.3s; }
    .problem-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-red), transparent); transform: scaleX(0); transition: transform 0.4s; }
    .problem-card:hover { border-color: rgba(255,34,85,0.3); transform: translateY(-4px); }
    .problem-card:hover::before { transform: scaleX(1); }
    .problem-icon { font-size: 36px; margin-bottom: 20px; display: block; }
    .problem-card h3 { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--neon-red); margin-bottom: 12px; }
    .problem-card p { font-size: 15px; line-height: 1.7; color: var(--text-dim); }
    #report { padding: 100px 40px; background: linear-gradient(180deg, transparent 0%, rgba(0,207,255,0.03) 50%, transparent 100%); }

    .ai-suggestion-box { background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.3); padding: 14px 18px; margin-top: 12px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--neon-green); display: flex; align-items: flex-start; gap: 10px; animation: fadeIn 0.4s ease; }

// ── Gemini API helper ─────────────────────────────────────────────────────────
const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';
const GEMINI_MODEL   = 'gemini-2.0-flash';

async function callClaude(messages, system = '') {
  // Convert message history to Gemini format
  const geminiMessages = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content || m.text || '' }],
  }));

  // Prepend system prompt as first user turn if provided
  if (system) {
    geminiMessages.unshift(
      { role: 'user',  parts: [{ text: `[SYSTEM INSTRUCTIONS] ${system}` }] },
      { role: 'model', parts: [{ text: 'Understood. I will follow those instructions.' }] }
    );
  }

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: geminiMessages,
        generationConfig: { maxOutputTokens: 1000, temperature: 0.7 },
      }),
    }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
}

// ── Custom Cursor ─────────────────────────────────────────────────────────────
function useCursor() {
  useEffect(() => {
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    const ch = document.getElementById('cursor-crosshair');
    let mx = 0, my = 0, rx = 0, ry = 0;
    const onMove = e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
      ch.style.left = mx + 'px'; ch.style.top = my + 'px';
    };
    const animate = () => {
      rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animate);
    };
    document.addEventListener('mousemove', onMove);
    animate();
    return () => document.removeEventListener('mousemove', onMove);
  }, []);
}

// ── Counter animation hook ────────────────────────────────────────────────────
function useCounter(target, active, suffix = '') {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) return;
    let cur = 0;
    const step = target / (2000 / 16);
    const t = setInterval(() => {
      cur = Math.min(cur + step, target);
      setVal(Math.floor(cur));
      if (cur >= target) clearInterval(t);
    }, 16);
    return () => clearInterval(t);
  }, [active, target]);
  return val.toLocaleString() + suffix;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ msg, isError, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);

  );
}

          <div className="upload-icon">📎</div>
          <p>Drag & drop or <span>click to upload</span> evidence files</p>
          <p style={{ fontSize:12, marginTop:4, color:'var(--text-muted)' }}>PNG, JPG, MP4, WebM — Max 50MB</p>
          <input type="file" id="file-input" multiple accept="image/*,video/*" style={{ display:'none' }} onChange={e => setFiles(Array.from(e.target.files))} />
        </div>
        {files.map((f, i) => <div key={i} style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:12, color:'var(--neon-green)', marginTop:6 }}>📁 {f.name} ({(f.size/1024).toFixed(1)} KB)</div>)}
      </div>

      <button className="submit-btn" onClick={submit} disabled={submitting}>
        {submitting ? '⚡ SUBMITTING...' : '⚡ SUBMIT REPORT TO DATABASE'}
      </button>
    </div>
  );
}

// ── LIVE FEED ─────────────────────────────────────────────────────────────────
function LiveFeed({ newItem }) {
  const [feed, setFeed] = useState([...DB.liveFeed]);
  const names = () => {
    const adj = ['Dark','Rage','Chaos','Ghost','Shadow','Toxic','Evil','Void'];
    const noun = ['Slayer','Hunter','King','Lord','Killer','Wolf','Snake'];
    return adj[Math.floor(Math.random()*adj.length)] + noun[Math.floor(Math.random()*noun.length)] + '#' + Math.floor(Math.random()*9000+1000);
  };
  useEffect(() => {
    if (!newItem) return;
    setFeed(f => [newItem, ...f].slice(0, 12));
  }, [newItem]);
  useEffect(() => {
    const games = ['Valorant','CS2','Apex','Fortnite','LoL','OW2','Warzone','PUBG'];
    const types = ['Verbal Harassment','Hate Speech','Griefing','Cheating','Racism','Threats'];
    const sevs = ['low','medium','high','critical'];
    const t = setInterval(() => {
      setFeed(f => [{ game: games[Math.floor(Math.random()*games.length)], player: names(), type: types[Math.floor(Math.random()*types.length)], sev: sevs[Math.floor(Math.random()*sevs.length)], time:'Just now' }, ...f].slice(0, 12));
    }, 6000);
    return () => clearInterval(t);
  }, []);
  return (
    <section id="feed">
      <div className="feed-container">
        <div className="feed-header">
          <div>
            <div className="section-label">Real-Time</div>
            <h2 className="section-title" style={{ fontSize:'clamp(24px,4vw,42px)' }}>LIVE REPORT FEED</h2>
          </div>
          <div className="live-dot">LIVE</div>
        </div>
        <div className="feed-list">
          {feed.map((item, i) => (
            <div key={i} className={`feed-item sev-${item.sev}`}>
              <div className="feed-game">{item.game}</div>
              <div className="feed-info">
                <div className="feed-player">{item.player}</div>
                <div className="feed-type">{item.type}</div>
              </div>
              <div className={`feed-sev ${item.sev}`}>{item.sev.toUpperCase()}</div>
              <div className="feed-time">{item.time}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function Leaderboard() {
  const [lb] = useState([...DB.leaderboard]);
  const rankCls = ['r1','r2','r3','rn','rn','rn','rn','rn'];
  const max = lb[0].count;
  return (
    <section id="leaderboard">
      <div className="lb-container">
        <div className="section-label">Hall of Shame</div>
        <h2 className="section-title">MOST REPORTED<br /><span style={{ color:'var(--neon-red)' }}>OFFENDERS</span></h2>
        <p className="section-desc" style={{ marginBottom:40 }}>Players with the highest report counts across all platforms. Updated in real-time.</p>
        <div className="lb-list">
          {lb.map((item, i) => (
            <div className="lb-item" key={i}>
              <div className={`lb-rank ${rankCls[i]}`}>#{i+1}</div>
              <div><div className="lb-name">{item.name}</div><div className="lb-game">{item.game}</div></div>
              <div className="lb-count">{item.count}</div>
              <div className="lb-bar-wrap"><div className="lb-bar" style={{ width:`${(item.count/max*100).toFixed(0)}%` }}></div></div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── PLAYER SEARCH ─────────────────────────────────────────────────────────────
function PlayerSearch({ showToast }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [notFound, setNotFound] = useState(false);
  const [aiSummaries, setAiSummaries] = useState({});
  const [loadingSummary, setLoadingSummary] = useState({});

  const search = () => {
    const q = query.trim().toLowerCase();
    if (!q) { showToast('Enter a gamer tag to search!', true); return; }
    setNotFound(false); setResults([]);
    const matches = Object.entries(DB.players).filter(([k]) => k.includes(q) || q.includes(k.split('#')[0]));
    const reportMatches = DB.reports.filter(r => r.offender.toLowerCase().includes(q));
    if (matches.length === 0 && reportMatches.length === 0) { setNotFound(true); return; }
    setResults([...matches.map(([,p]) => ({ type:'db', data:p })), ...reportMatches.map(r => ({ type:'report', data:r }))]);
  };

  const getAiSummary = async (player) => {
    const key = player.username;
    setLoadingSummary(s => ({...s, [key]: true}));
    try {
      const summary = await callClaude(
        [{ role:'user', content:`Generate a short 2-sentence AI risk assessment for this gaming offender profile: Username: ${player.username}, Reports: ${player.reports}, Offenses: ${player.offenses.join(', ')}, Status: ${player.status}, Severity: ${player.severity}. Be direct and professional.` }],
        'You are a gaming safety AI for GGReport. Write concise risk assessments.'
      );
      setAiSummaries(s => ({...s, [key]: summary}));
    } catch { showToast('AI summary failed.', true); }
    setLoadingSummary(s => ({...s, [key]: false}));
  };

  const statusColor = { 'BANNED':'var(--neon-red)', 'UNDER REVIEW':'var(--neon-yellow)', 'WARNED':'#ff6600', 'MONITORING':'var(--neon-blue)' };

  return (
    <section id="search">
      <div className="search-container">
        <div className="section-label">Player Lookup</div>
        <h2 className="section-title">CHECK ANY<br /><span style={{ color:'var(--neon-blue)' }}>PLAYER'S RECORD</span></h2>
        <p className="section-desc" style={{ margin:'16px auto 0', maxWidth:600 }}>Search the GGReport database to see a player's toxicity history before teaming up.</p>
        <div className="search-wrap">
          <input className="search-input" placeholder="Enter gamer tag (e.g. ShadowKiller#420)" value={query} onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && search()} />
          <button className="search-btn" onClick={search}>SCAN</button>
        </div>
        <div id="search-results">
          {results.map((r, i) => {
            if (r.type === 'db') {
              const p = r.data;
              const riskPct = Math.min((p.reports / 50) * 100, 100);
              const key = p.username;
              return (
                <div className="search-result-card" key={i}>
                  <div className="result-username">⚠ {p.username}</div>
                  <div className="result-meta">
                    <div className="result-tag">Reports: <span style={{ color:'var(--neon-red)', fontWeight:700 }}>{p.reports}</span></div>
                    <div className="result-tag">Games: <span>{p.games.join(', ')}</span></div>
                    <div className="result-tag">Status: <span style={{ color: statusColor[p.status] || 'var(--text-dim)', fontWeight:700 }}>{p.status}</span></div>
                    <div className="result-tag">Since: <span>{p.joined}</span></div>
                  </div>
                  <div className="result-tag" style={{ marginBottom:8 }}>Offenses: <span style={{ color:'var(--neon-red)' }}>{p.offenses.join(' · ')}</span></div>
                  <div style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:11, color:'var(--text-dim)', marginBottom:6 }}>TOXICITY RISK SCORE</div>
                  <div className="result-bar-bg"><div className="result-bar-fill" style={{ width:`${riskPct}%` }}></div></div>
                  <div style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:11, color:'var(--text-dim)', marginTop:4 }}>{riskPct.toFixed(0)}/100 — SEVERITY: <span style={{ color: statusColor[p.status] }}>{p.severity}</span></div>

                  {aiSummaries[key] ? (
                    <div className="ai-summary-box">
                      <div className="ai-label">🤖 AI RISK ASSESSMENT</div>
                      {aiSummaries[key]}
                    </div>
                  ) : (
                    <button className="ai-analyze-btn" style={{ marginTop:14 }} onClick={() => getAiSummary(p)} disabled={loadingSummary[key]}>
                      🤖 {loadingSummary[key] ? <span>GENERATING AI SUMMARY<span className="loading-dots"></span></span> : 'GET AI RISK SUMMARY'}
                    </button>
                  )}
                </div>
              );
            } else {
              const rep = r.data;
              return (
                <div className="search-result-card" key={i}>
                  <div className="result-username">📋 {rep.offender}</div>
                  <div className="result-meta">
                    <div className="result-tag">Game: <span>{rep.game}</span></div>
                    <div className="result-tag">Offense: <span style={{ color:'var(--neon-red)' }}>{rep.abuseType}</span></div>
                    <div className="result-tag">Severity: <span>{rep.severity}</span></div>
                    <div className="result-tag">Report ID: <span style={{ color:'var(--neon-green)' }}>{rep.id}</span></div>
                  </div>
                  <div style={{ fontSize:14, color:'var(--text-dim)' }}>Newly reported — Under review by moderators.</div>
                </div>
              );
            }
          })}
        </div>
        {notFound && <div id="no-results" style={{ display:'block', textAlign:'center', padding:40, color:'var(--text-dim)', fontSize:16 }}>No records found. This player has a clean record — or hasn't been caught yet. 👀</div>}
      </div>
    </section>
  );
}

// ── STATS DASHBOARD ───────────────────────────────────────────────────────────
function StatsDashboard() {
  const [active, setActive] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setActive(true); obs.disconnect(); } }, { threshold: 0.3 });
    obs.observe(ref.current); return () => obs.disconnect();
  }, []);
  const t = useCounter(184729, active);
  const b = useCounter(42381, active);
  const r = useCounter(89, active, '%');
  const g = useCounter(24, active);
  const h = useCounter(4, active);
  const max = Math.max(...DB.chartData.map(d => d.val));
  return (
    <section id="stats" ref={ref}>
      <div className="stats-container">
        <div className="section-label">Platform Analytics</div>
        <h2 className="section-title" style={{ marginBottom:50 }}>TOXICITY<br /><span style={{ color:'var(--neon-blue)' }}>DASHBOARD</span></h2>
        <div className="stats-grid">
          {[{num:t,label:'Total Reports',accent:'var(--neon-red)'},{num:b,label:'Bans Issued',accent:'var(--neon-yellow)'},{num:r,label:'Resolution Rate',accent:'var(--neon-green)'},{num:g,label:'Games Integrated',accent:'var(--neon-blue)'},{num:h,label:'Avg. Response (hrs)',accent:'#ff6600'}].map((s,i) => (
            <div className="stat-card" key={i} style={{ '--accent': s.accent }}>
              <div className="stat-card-num">{s.num}</div>
              <div className="stat-card-label">{s.label}</div>
            </div>
          ))}
        </div>
        <div className="chart-wrap" style={{ marginTop:2 }}>
          <div className="chart-title">📊 Reports by Game (Last 7 Days)</div>
          <div className="bar-chart">
            {DB.chartData.map((d, i) => (
              <div className="bar-col" key={i}>
                <div className="bar-fill" style={{ height: active ? `${(d.val/max)*100}%` : '0%', transition:'height 1.5s cubic-bezier(0.34,1.56,0.64,1)' }}>
                  <span className="bar-val">{d.val}</span>
                </div>
                <div className="bar-label">{d.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

// ── AI CHATBOT ────────────────────────────────────────────────────────────────
function AIChatbot() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    { role:'ai', text:"Hey! I'm GG-Bot 🤖, your AI gaming safety assistant. Ask me anything about toxicity reports, player safety, or how GGReport works!" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  const send = async () => {
    const txt = input.trim();
    if (!txt || loading) return;
    setInput('');
    setMessages(m => [...m, { role:'user', text: txt }]);
    setLoading(true);
    try {
      const history = messages.filter(m => m.role !== 'typing').map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }));
      history.push({ role:'user', content: txt });
      const reply = await callClaude(history, 'You are GG-Bot, an AI assistant for GGReport — a cross-platform gaming toxicity reporting platform. Help users with: filing reports, understanding toxicity issues, player safety, and how the platform works. Keep responses concise (2-4 sentences). Use a friendly but professional gaming-savvy tone.');
      setMessages(m => [...m, { role:'ai', text: reply }]);
    } catch {
      setMessages(m => [...m, { role:'ai', text:'⚠ Connection error. Check that your API key is configured.' }]);
    }
    setLoading(false);
  };

  return (
    <>
      {open && (
        <div className="chat-window">
          <div className="chat-header">
            <div>
              <div className="chat-header-title">GG-BOT AI ASSISTANT</div>
              <div className="chat-header-sub">POWERED BY GEMINI · ONLINE</div>
            </div>
            <button className="chat-close" onClick={() => setOpen(false)}>✕</button>
          </div>
          <div className="chat-messages">
            {messages.map((m, i) => (
              <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>
            ))}
            {loading && <div className="chat-msg ai typing">GG-Bot is thinking<span className="loading-dots"></span></div>}
            <div ref={bottomRef} />
          </div>
          <div className="chat-input-row">
            <input className="chat-input" placeholder="Ask GG-Bot anything..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} />
            <button className="chat-send" onClick={send} disabled={loading}>SEND</button>
          </div>
        </div>
      )}
      <button className="chat-fab" onClick={() => setOpen(o => !o)} title="Open AI Assistant">
        {open ? '✕' : '🤖'}
      </button>
    </>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  useCursor();
  const [toast, setToast] = useState(null);
  const [newFeedItem, setNewFeedItem] = useState(null);

  const showToast = (msg, isError = false) => setToast({ msg, isError });

  return (
    <>
      {toast && <Toast msg={toast.msg} isError={toast.isError} onDone={() => setToast(null)} />}

      <nav>
        <div className="nav-logo">GG<span>REPORT</span></div>
        <ul className="nav-links">
          {['problem','report','feed','leaderboard','search','stats'].map(id => (
            <li key={id}><a href={`#${id}`} onClick={e => { e.preventDefault(); document.getElementById(id).scrollIntoView({ behavior:'smooth' }); }}>{id === 'feed' ? 'Live Feed' : id === 'leaderboard' ? 'Offenders' : id.charAt(0).toUpperCase() + id.slice(1)}</a></li>
          ))}
        </ul>
        <button className="nav-btn" onClick={() => document.getElementById('report').scrollIntoView({ behavior:'smooth' })}>FILE REPORT</button>
      </nav>

      <Hero showToast={showToast} />
      <div className="sep"></div>
      <Problem />
      <div className="sep"></div>

      <section id="report">
        <div className="report-container">
          <div className="section-label">File a Report</div>
          <h2 className="section-title" style={{ marginBottom:40 }}>REPORT A<br /><span style={{ color:'var(--neon-red)' }}>TOXIC PLAYER</span></h2>
          <div className="report-form-wrap">
            <ReportForm onNewReport={item => setNewFeedItem(item)} showToast={showToast} />
          </div>
        </div>
      </section>

      <div className="sep"></div>
      <LiveFeed newItem={newFeedItem} />
      <div className="sep"></div>
      <Leaderboard />
      <div className="sep"></div>
      <PlayerSearch showToast={showToast} />
      <div className="sep"></div>
      <StatsDashboard />

      <footer>
        <div className="footer-logo">GG<span>REPORT</span></div>
        <div className="footer-links">
          {['About','Report','Analytics','Developer API','Privacy Policy'].map(l => <a key={l} href="#">{l}</a>)}
        </div>
        <div className="footer-copy">© 2025 GGREPORT.GG — BUILT FOR SAFER GAMING</div>
      </footer>

      <AIChatbot />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
